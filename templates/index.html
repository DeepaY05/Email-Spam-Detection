<!DOCTYPE html>
<html>
<head>
    <title>Email Spam Detection</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 400px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
            resize: none;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #007bff;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .spam {
            color: red;
        }

        .ham {
            color: green;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Email Spam Detection</h1>

        <form action="/predict" method="post">
            <textarea name="email" placeholder="Enter your email here..."></textarea><br>
            <button type="submit">Check</button>
        </form>

        {% if prediction_text %}
            <div class="result 
                {% if prediction_text == 'Spam' %}spam{% else %}ham{% endif %}">
                Result: {{ prediction_text }}
            </div>
        {% endif %}
    </div>

</body>
</html>
